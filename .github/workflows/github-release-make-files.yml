name: create release files

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  DOTNET_SDK_VERSION: '10'
  PROJECT_NAME: KeepMachineAwake
  OUTPUT_ROOT: './output'
  VERSION: ${{github.ref_name}}

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    strategy:
      matrix:
        self_contained: [true, false]
        include:
          - self_contained: true
            output_subdir: win64-self-contained
          - self_contained: false
            output_subdir: win64-framework-dependent
    name: publish ${{matrix.output_subdir}}
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{env.DOTNET_SDK_VERSION}}
      - name: dotnet publish
        run: >-
          dotnet publish ./${{env.PROJECT_NAME}}
          --configuration Release
          --runtime win-x64
          --property:EnableWindowsTargeting=true
          --property:PublishSingleFile=true
          --property:PublishSelfContained=${{matrix.self_contained}}
          --property:Version=${{env.VERSION}}
          --output ${{env.OUTPUT_ROOT}}/${{matrix.output_subdir}}-${{env.VERSION}}
      - name: zip
        run: | 
          cd ${{env.OUTPUT_ROOT}}
          for i in ./*/; do zip -r "${i%/}.zip" "$i"; done
      - name: upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{env.OUTPUT_ROOT}}/*.zip
